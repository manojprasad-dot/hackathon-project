<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishGuard — Phishing Warning</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #070709;
      color: #f0f0f4;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
      width: 100%;
      padding: 40px 48px;
      background: linear-gradient(160deg, #0d0b0b 0%, #100a0a 100%);
      border: 1px solid rgba(255,59,48,0.15);
      border-radius: 24px;
      box-shadow: 0 0 80px rgba(255,59,48,0.07), 0 40px 80px rgba(0,0,0,0.5);
      animation: cardIn .4s cubic-bezier(.34,1.2,.64,1);
    }
    @keyframes cardIn { from{opacity:0;transform:scale(.96) translateY(12px)} to{opacity:1;transform:none} }

    /* On-device badge */
    .onnx-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: .06em;
      color: #5a9fff;
      background: linear-gradient(135deg, rgba(10,132,255,.12), rgba(191,90,242,.08));
      border: 1px solid rgba(10,132,255,.2);
      padding: 4px 12px; border-radius: 20px; margin-bottom: 28px;
    }

    .shield {
      width: 88px; height: 88px;
      margin: 0 auto 22px;
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: shieldPulse 2s ease infinite;
    }
    @keyframes shieldPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.25); }
      50% { box-shadow: 0 0 0 18px rgba(255,59,48,0); }
    }
    h1 { font-size: 30px; font-weight: 800; color: #FF3B30; margin-bottom: 10px; letter-spacing: -.5px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }

    .info-box {
      background: rgba(255,59,48,0.04);
      border: 1px solid rgba(255,59,48,0.15);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 22px;
      text-align: left;
    }
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 12px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #555; font-size: 12px; font-weight: 600; letter-spacing:.04em; white-space:nowrap; padding-top:1px; }
    .info-value { color: #ddd; font-size: 12px; font-weight: 600; word-break: break-all; text-align: right; }
    .info-value.danger { color: #FF6B5E; }

    /* Confidence bar */
    .conf-bar-wrap { padding: 12px 0 4px; }
    .conf-bar-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .conf-bar-label { font-size: 11px; color: #555; font-weight: 600; letter-spacing:.04em; }
    .conf-bar-val { font-size: 11px; color: #FF6B5E; font-weight: 700; }
    .confidence-bar {
      height: 7px;
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF9500, #FF3B30);
      border-radius: 6px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 10px rgba(255,59,48,0.4);
    }

    /* Risk level badge */
    .risk-level-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 10px;
      background: rgba(255,59,48,.12); color: #FF3B30;
      border: 1px solid rgba(255,59,48,.2); letter-spacing:.05em;
    }

    /* Reasons */
    .reasons { text-align: left; margin-bottom: 28px; }
    .reasons-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: #555; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .reason-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      animation: reasonIn .35s ease;
    }
    @keyframes reasonIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
    .reason-item:last-child { border-bottom: none; }
    .reason-dot { width: 6px; height: 6px; border-radius: 50%; background: #FF3B30; flex-shrink: 0; margin-top: 5px; }
    .reason-text { font-size: 13px; color: #bbb; line-height: 1.55; }

    /* Buttons */
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 13px 32px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-back { background: #FF3B30; color: #fff; box-shadow: 0 4px 20px rgba(255,59,48,0.3); }
    .btn-back:hover { background: #e02020; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,59,48,0.4); }
    .btn-proceed { background: transparent; color: #444; border: 1px solid rgba(255,255,255,0.1); font-family: inherit; }
    .btn-proceed:hover { color: #777; border-color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="onnx-badge">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      Analyzed locally by ONNX Runtime Web · No data sent to any server
    </div>

    <div class="shield">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z"
              fill="rgba(255,59,48,0.15)" stroke="#FF3B30" stroke-width="1.5"/>
        <line x1="12" y1="8" x2="12" y2="13" stroke="#FF3B30" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="12" cy="16.5" r="1.3" fill="#FF3B30"/>
      </svg>
    </div>

    <h1>Phishing Website Detected</h1>
    <p class="subtitle">
      PhishGuard's on-device AI has blocked this website.<br>
      Your personal data was <strong style="color:#FF6B5E">never sent</strong> to any external server.
    </p>

    <div class="info-box">
      <div class="info-row">
        <span class="info-label">Blocked URL</span>
        <span class="info-value danger" id="blocked-url">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Risk Level</span>
        <span class="info-value"><span class="risk-level-badge" id="risk-level">HIGH</span></span>
      </div>
      <div class="info-row" style="display:block;padding-top:14px">
        <div class="conf-bar-wrap">
          <div class="conf-bar-header">
            <span class="conf-bar-label">THREAT CONFIDENCE</span>
            <span class="conf-bar-val" id="confidence">—</span>
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill" id="conf-bar" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="reasons" id="reasons-section" style="display:none">
      <div class="reasons-header">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
        </svg>
        Why this was flagged
      </div>
      <div id="reasons-list"></div>
    </div>

    <div class="actions">
      <button class="btn btn-back" id="go-back">← Go Back to Safety</button>
      <button class="btn btn-proceed" id="proceed">Proceed Anyway</button>
    </div>
  </div>

  <script src="warning.js"></script>

</body>
</html>
