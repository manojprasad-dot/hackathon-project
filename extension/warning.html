<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishGuard — Phishing Warning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 560px;
      padding: 40px;
    }
    .shield {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: rgba(255,59,48,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.3); }
      50% { box-shadow: 0 0 0 20px rgba(255,59,48,0); }
    }
    h1 { font-size: 28px; color: #FF3B30; margin-bottom: 12px; }
    .subtitle { color: #888; font-size: 15px; margin-bottom: 32px; }
    .info-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; font-size: 13px; }
    .info-value { color: #fff; font-size: 13px; font-weight: 600; word-break: break-all; max-width: 300px; text-align: right; }
    .info-value.danger { color: #FF3B30; }
    .reasons { text-align: left; margin-bottom: 24px; }
    .reasons h3 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .reasons li { color: #ccc; font-size: 13px; line-height: 1.8; margin-left: 18px; }
    .actions { display: flex; gap: 12px; justify-content: center; }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-back { background: #FF3B30; color: #fff; }
    .btn-back:hover { background: #e02020; }
    .btn-proceed { background: transparent; color: #666; border: 1px solid rgba(255,255,255,0.1); }
    .btn-proceed:hover { color: #999; border-color: rgba(255,255,255,0.2); }
    .confidence-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF9500, #FF3B30);
      border-radius: 3px;
      transition: width 0.8s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="shield">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 19h20L12 2z" fill="#FF3B30" opacity="0.3"/>
        <path d="M12 2L2 19h20L12 2z" stroke="#FF3B30" stroke-width="2" stroke-linejoin="round"/>
        <line x1="12" y1="9" x2="12" y2="13" stroke="#FF3B30" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1" fill="#FF3B30"/>
      </svg>
    </div>
    <h1>Phishing Website Detected</h1>
    <p class="subtitle">PhishGuard has blocked a suspicious website</p>

    <div class="info-box">
      <div class="info-row">
        <span class="info-label">Blocked URL</span>
        <span class="info-value danger" id="blocked-url">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Threat Confidence</span>
        <span class="info-value danger" id="confidence">—</span>
      </div>
      <div class="info-row" style="display:block; padding-top:12px;">
        <div class="confidence-bar">
          <div class="confidence-fill" id="conf-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="reasons" id="reasons-section" style="display:none">
      <h3>Why this is suspicious</h3>
      <ul id="reasons-list"></ul>
    </div>

    <div class="actions">
      <button class="btn btn-back" id="go-back">← Go Back to Safety</button>
      <button class="btn btn-proceed" id="proceed">Proceed Anyway</button>
    </div>
  </div>

  <script src="warning.js"></script>

</body>
</html>
